<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FGO-py</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --card: #0f3460;
            --primary: #e94560;
            --success: #4ecca3;
            --warning: #f0a500;
            --text: #eaeaea;
            --text-dim: #a0a0b0;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { color: var(--text); }
        .connection {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .connection .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }
        .connection.connected .dot { background: var(--success); }

        /* Screenshot */
        .screenshot-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            touch-action: none;
        }
        .screenshot-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        .screenshot-container .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .screenshot-controls {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 6px;
            margin-bottom: 12px;
        }
        .btn-live {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--text-dim);
            background: transparent;
            color: var(--text-dim);
        }
        .btn-live.active {
            border-color: var(--success);
            color: var(--success);
            background: rgba(78, 204, 163, 0.1);
        }
        .btn-live:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-auto-battle {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--warning);
            background: transparent;
            color: var(--warning);
        }
        .btn-auto-battle:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-auto-battle.active {
            border-color: var(--warning);
            color: #000;
            background: var(--warning);
        }
        .btn-manual {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #7c4dff;
            background: transparent;
            color: #7c4dff;
        }
        .btn-manual:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-manual.active {
            border-color: #7c4dff;
            color: #fff;
            background: #7c4dff;
        }

        /* Active Task Box */
        .active-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
        }
        .active-box h3 {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .active-task {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            border: 1px solid var(--success);
        }
        .active-task .info {
            flex: 1;
            font-size: 0.9rem;
        }
        .active-task .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(78, 204, 163, 0.2);
            color: var(--success);
        }
        .active-task .expand-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
            transition: transform 0.2s;
        }
        .active-task .expand-btn.expanded { transform: rotate(90deg); }
        .active-box .item-details {
            display: none;
            margin-top: 0;
            margin-bottom: 10px;
            padding: 8px;
            background: var(--card);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .active-box .item-details.show { display: block; }
        .active-empty {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-align: center;
            padding: 12px 0;
        }
        .btn-control {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-control:active { opacity: 0.7; }
        .btn-control:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-control.start { background: var(--success); color: #000; }
        .btn-control.cancel { background: var(--primary); color: #fff; }

        /* Sections */
        .section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
        }
        .section h3 {
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: var(--text-dim);
        }

        /* Queue List */
        .queue-list { list-style: none; }
        .queue-item {
            background: var(--card);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            font-size: 0.85rem;
            cursor: grab;
            transition: opacity 0.2s, transform 0.2s;
        }
        .queue-item.dragging { opacity: 0.4; }
        .queue-item.drag-over { border: 1px dashed var(--success); }
        .queue-item .item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .queue-item .drag-handle {
            color: var(--text-dim);
            margin-right: 8px;
            font-size: 1rem;
            cursor: grab;
        }
        .queue-item .info { flex: 1; }
        .queue-item .expand-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
            transition: transform 0.2s;
        }
        .queue-item .expand-btn.expanded { transform: rotate(90deg); }
        .queue-item .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            white-space: nowrap;
        }
        .queue-item .status-badge.pending { background: rgba(160, 160, 176, 0.2); color: var(--text-dim); }
        .queue-item .status-badge.cancelled { background: rgba(233, 69, 96, 0.2); color: var(--primary); }
        .queue-item .status-badge.error { background: rgba(233, 69, 96, 0.2); color: var(--primary); }
        .queue-item .remove-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .queue-item .item-details {
            display: none;
            margin-top: 8px;
            padding: 8px;
            background: var(--surface);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .queue-item .item-details.show { display: block; }
        .queue-empty {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-align: center;
            padding: 12px 0;
        }

        /* Quest Selector */
        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .form-row label {
            font-size: 0.8rem;
            color: var(--text-dim);
            min-width: 50px;
        }
        .form-row select, .form-row input {
            flex: 1;
            background: var(--card);
            color: var(--text);
            border: 1px solid #2a3a5e;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 0.85rem;
        }
        .form-row input[type="number"] { max-width: 70px; }
        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .form-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--warning);
        }
        .form-check label {
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
        }
        .btn-add {
            width: 100%;
            padding: 10px;
            background: var(--card);
            color: var(--success);
            border: 1px solid var(--success);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-add:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="header">
        <a class="back-link" id="backLink" href="/">← Manager</a>
        <div class="connection" id="connStatus">
            <span class="dot"></span>
            <span>Disconnected</span>
        </div>
    </div>

    <!-- Game Screenshot -->
    <div class="screenshot-container" id="screenshotBox" onclick="takeScreenshot()">
        <div class="no-image">Tap to capture screenshot</div>
    </div>
    <div class="screenshot-controls">
        <button class="btn-manual" id="btnManual" onclick="toggleManual()">🖐 Manual</button>
        <button class="btn-auto-battle" id="btnAutoBattle" onclick="startAutoBattle()">⚔ Auto Battle</button>
        <button class="btn-live" id="btnLive" onclick="toggleLive()">● Live</button>
    </div>

    <!-- Active Task Box -->
    <div class="active-box">
        <h3>Now Running</h3>
        <div id="activeSlot">
            <div class="active-empty">No active task</div>
        </div>
        <button class="btn-control start" id="btnControl" onclick="controlToggle()">▶ Start</button>
    </div>

    <!-- Pending Queue -->
    <div class="section">
        <h3>Queue</h3>
        <ul class="queue-list" id="queueList">
            <li class="queue-empty">No tasks in queue</li>
        </ul>
    </div>

    <!-- Quest Selector -->
    <div class="section">
        <h3>Add Quest</h3>
        <div class="form-row">
            <label>Part</label>
            <select id="selPart" onchange="onPartChange()"></select>
        </div>
        <div class="form-row">
            <label>Chapter</label>
            <select id="selChapter" onchange="onChapterChange()"></select>
        </div>
        <div class="form-row">
            <label>Quest</label>
            <select id="selQuest"></select>
        </div>
        <div class="form-row">
            <label>Repeat</label>
            <input type="number" id="inputCount" value="1" min="1" max="999">
        </div>
        <div class="form-check">
            <input type="checkbox" id="chkNormalAttack">
            <label for="chkNormalAttack">仅使用普通攻击</label>
        </div>
        <button class="btn-add" onclick="addToQueue()">+ Add to Queue</button>
    </div>

    <!-- Add Task (system-level tasks) -->
    <div class="section">
        <h3>Add Task</h3>
        <div class="form-row">
            <label>Task</label>
            <select id="selTaskType" onchange="onTaskTypeChange()">
                <option value="wait">Wait</option>
                <option value="stop_emulator">Stop Emulator</option>
                <option value="start_emulator">Start Emulator</option>
            </select>
        </div>
        <div class="form-row" id="taskParamWait">
            <label>Minutes</label>
            <input type="number" id="inputWaitMinutes" value="30" min="1" max="9999">
        </div>
        <button class="btn-add" onclick="addTaskToQueue()">+ Add to Queue</button>
    </div>

<script>
const API = (() => {
    const match = location.pathname.match(/^(\/scripts\/[^/]+\/\d+)\//);
    return match ? match[1] : '';
})();
let ws = null;
let catalog = null;
let state = { active: null, pending: [], running: false };
let liveInterval = null;
let liveActive = false;
let autoBattleActive = false;
let manualMode = false;
let preManualLiveState = false;
let pointerState = null;
let expandedIds = new Set(['active']);  // active task expanded by default
let activeProgress = null;  // {current, total, detail}

// Back link visibility
(function() {
    const match = location.pathname.match(/^\/scripts\//);
    if (match) {
        document.getElementById('backLink').href = '/';
    } else {
        document.getElementById('backLink').style.display = 'none';
    }
})();

// --- WebSocket ---
function getWsUrl() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const path = location.pathname;
    const match = path.match(/^(\/scripts\/[^/]+\/\d+)\//);
    if (match) {
        return `${proto}://${location.host}${match[1]}/ws/status`;
    }
    return `${proto}://${location.host}/ws/status`;
}

function connectWS() {
    ws = new WebSocket(getWsUrl());
    ws.onopen = () => {
        document.getElementById('connStatus').className = 'connection connected';
        document.getElementById('connStatus').querySelector('span:last-child').textContent = 'Connected';
        // Sync auto-battle state on reconnect (in case we missed events while disconnected)
        syncAutoBattleState();
    };
    ws.onclose = () => {
        document.getElementById('connStatus').className = 'connection';
        document.getElementById('connStatus').querySelector('span:last-child').textContent = 'Disconnected';
        setTimeout(connectWS, 3000);
    };
    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleEvent(msg);
    };
}

async function syncAutoBattleState() {
    try {
        const resp = await fetch(`${API}/api/control/auto-battle/status`);
        const data = await resp.json();
        if (autoBattleActive !== data.active) {
            autoBattleActive = data.active;
            render();
        }
    } catch (_) {}
}

function handleEvent(msg) {
    switch (msg.event) {
        case 'state_updated':
        case 'queue_idle':
            if (msg.state) {
                state = msg.state;
            }
            activeProgress = null;
            render();
            break;
        case 'task_started':
            if (msg.state) {
                state = msg.state;
            }
            activeProgress = null;
            // Stop live when emulator is being shut down
            if (msg.task && msg.task.type === 'stop_emulator' && liveActive) {
                showEmulatorOffline();
            }
            render();
            break;
        case 'task_finished':
            if (msg.state) {
                state = msg.state;
            }
            activeProgress = null;
            // Resume live when emulator has started
            if (msg.task && msg.task.type === 'start_emulator' && msg.task.status === 'done' && !liveActive) {
                startLive();
                document.getElementById('btnLive').classList.add('active');
            }
            render();
            break;
        case 'task_progress':
            activeProgress = msg.progress;
            renderActiveProgress();
            break;
        case 'auto_battle_started':
            autoBattleActive = true;
            render();
            break;
        case 'auto_battle_finished':
            autoBattleActive = false;
            render();
            break;
        case 'manual_mode':
            manualMode = msg.active;
            if (manualMode) {
                enableManualPreview();
            } else {
                disableManualPreview();
            }
            render();
            break;
    }
}

// --- Rendering ---
function render() {
    renderActive();
    renderPending();
    renderButton();
    renderAutoBattle();
    renderManual();
}

function renderActive() {
    const el = document.getElementById('activeSlot');
    if (state.active) {
        const desc = describeTask(state.active);
        const details = describeTaskDetails(state.active);
        // Active task is always expanded
        expandedIds.add('active');
        const progressBar = renderProgressBar(activeProgress);
        const st = state.active.status;
        if (st === 'active') {
            el.innerHTML = `<div class="active-task">
                <span class="info">${desc}</span>
                <span class="status-badge">Running</span>
                <button class="expand-btn expanded" onclick="toggleExpand(this, 'active')">▸</button>
            </div>
            <div class="item-details show">${progressBar}${details}</div>`;
        } else {
            const label = st === 'error' ? 'Error' : 'Cancelled';
            el.innerHTML = `<div class="active-task" style="border-color: var(--primary);">
                <span class="info">${desc}</span>
                <span class="status-badge" style="background: rgba(233,69,96,0.2); color: var(--primary);">${label}</span>
                <button class="expand-btn expanded" onclick="toggleExpand(this, 'active')">▸</button>
            </div>
            <div class="item-details show">${details}</div>`;
        }
    } else {
        activeProgress = null;
        el.innerHTML = '<div class="active-empty">No active task</div>';
    }
}

function renderActiveProgress() {
    // Update just the progress bar without full re-render (avoids flicker)
    const detailsEl = document.querySelector('#activeSlot .item-details');
    if (!detailsEl) return;
    const bar = detailsEl.querySelector('.progress-wrap');
    const newBar = renderProgressBar(activeProgress);
    if (bar) {
        bar.outerHTML = newBar;
    } else if (newBar) {
        detailsEl.insertAdjacentHTML('afterbegin', newBar);
    }
}

function renderProgressBar(progress) {
    if (!progress || !progress.total) return '';
    const pct = Math.round((progress.current / progress.total) * 100);
    return `<div class="progress-wrap" style="margin-bottom:8px;">
        <div style="background:rgba(255,255,255,0.08);border-radius:6px;height:20px;position:relative;overflow:hidden;">
            <div style="background:var(--success);height:100%;border-radius:6px;width:${pct}%;transition:width 0.5s ease;"></div>
            <span style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;">${progress.current}/${progress.total} ${progress.detail || ''}</span>
        </div>
    </div>`;
}

function renderPending() {
    const el = document.getElementById('queueList');
    if (!state.pending || !state.pending.length) {
        el.innerHTML = '<li class="queue-empty">No tasks in queue</li>';
        return;
    }
    el.innerHTML = state.pending.map((task, idx) => {
        const desc = describeTask(task);
        const details = describeTaskDetails(task);
        const expanded = expandedIds.has(task.id);
        return `<li class="queue-item" draggable="true" data-id="${task.id}" data-idx="${idx}">
            <div class="item-header">
                <span class="drag-handle">≡</span>
                <span class="info">${desc}</span>
                <span class="status-badge pending">Pending</span>
                <button class="expand-btn${expanded ? ' expanded' : ''}" onclick="toggleExpand(this, '${task.id}')">▸</button>
                <button class="remove-btn" onclick="removeFromQueue('${task.id}')">🗑</button>
            </div>
            <div class="item-details${expanded ? ' show' : ''}">${details}</div>
        </li>`;
    }).join('');
    setupDragAndDrop();
}

function renderButton() {
    const btn = document.getElementById('btnControl');
    if (manualMode || autoBattleActive) {
        btn.className = 'btn-control start';
        btn.textContent = '▶ Start';
        btn.disabled = true;
    } else if (state.active && state.active.status === 'active') {
        btn.className = 'btn-control cancel';
        btn.textContent = '✕ Cancel';
        btn.disabled = false;
    } else if ((state.pending && state.pending.length > 0) || (state.active && state.active.status !== 'active')) {
        btn.className = 'btn-control start';
        btn.textContent = '▶ Start';
        btn.disabled = !(state.pending && state.pending.length > 0);
    } else {
        btn.className = 'btn-control start';
        btn.textContent = '▶ Start';
        btn.disabled = true;
    }
}

function describeTask(task) {
    if (task.type === 'operation' && task.params && task.params.quests) {
        const q = task.params.quests[0];
        const name = findQuestName(q.quest) || q.quest.join('-');
        const count = task.params.quests.reduce((s, x) => s + x.count, 0);
        return `${name} ×${count}`;
    }
    if (task.type === 'battle') return 'Battle';
    if (task.type === 'wait') return `Wait ${task.params.minutes || '?'} min`;
    if (task.type === 'stop_emulator') return 'Stop Emulator';
    if (task.type === 'start_emulator') return 'Start Emulator';
    return task.type;
}

function findQuestName(tuple) {
    if (!catalog) return null;
    const key = tuple.join('-');
    for (const part of catalog.parts) {
        for (const ch of part.chapters) {
            for (const q of ch.quests) {
                if (q.id === key) return `${ch.name} - ${q.name}`;
            }
        }
    }
    return null;
}

// --- API calls ---
async function fetchState() {
    const res = await fetch(`${API}/api/queue`);
    state = await res.json();
    // Restore progress from active task (e.g., after page reload)
    if (state.active && state.active.progress) {
        activeProgress = state.active.progress;
    }
    render();
}

async function fetchCatalog() {
    const res = await fetch(`${API}/api/quests`);
    catalog = await res.json();
    populateParts();
}

async function controlToggle() {
    if (state.active && state.active.status === 'active') {
        await fetch(`${API}/api/control/cancel`, { method: 'POST' });
    } else {
        await fetch(`${API}/api/control/start`, { method: 'POST' });
    }
    setTimeout(fetchState, 300);
}

async function addToQueue() {
    const sel = document.getElementById('selQuest');
    if (!sel.value) return;
    const quest = JSON.parse(sel.value);
    const count = parseInt(document.getElementById('inputCount').value) || 1;
    const normalAttackOnly = document.getElementById('chkNormalAttack').checked;
    try {
        const params = {
            quests: [{ quest, count }],
            apple_total: 0,
            apple_kind: 'gold',
        };
        if (normalAttackOnly) params.normal_attack_only = true;
        await fetch(`${API}/api/queue`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'operation', params })
        });
        await fetchState();
    } catch (e) {
        console.error('Add to queue error:', e);
    }
}

function onTaskTypeChange() {
    const type = document.getElementById('selTaskType').value;
    document.getElementById('taskParamWait').style.display = type === 'wait' ? '' : 'none';
}

async function addTaskToQueue() {
    const type = document.getElementById('selTaskType').value;
    let params = {};
    if (type === 'wait') {
        params.minutes = parseInt(document.getElementById('inputWaitMinutes').value) || 1;
    }
    try {
        await fetch(`${API}/api/queue`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, params })
        });
        await fetchState();
    } catch (e) {
        console.error('Add task error:', e);
    }
}

async function removeFromQueue(taskId) {
    await fetch(`${API}/api/queue/${taskId}`, { method: 'DELETE' });
    await fetchState();
}

async function takeScreenshot() {
    try {
        const res = await fetch(`${API}/api/screenshot`, { method: 'POST' });
        if (res.status === 503) {
            // Device offline — show placeholder and stop live
            showEmulatorOffline();
            return;
        }
        const data = await res.json();
        const box = document.getElementById('screenshotBox');
        let img = box.querySelector('img');
        if (!img) {
            box.innerHTML = '';
            img = document.createElement('img');
            img.alt = 'screenshot';
            box.appendChild(img);
        }
        img.src = `data:image/jpeg;base64,${data.image}`;
    } catch (e) {
        console.error('Screenshot failed:', e);
    }
    // Schedule next frame if live is active (non-overlapping loop)
    if (liveActive) {
        liveInterval = setTimeout(takeScreenshot, 100);
    }
}

function showEmulatorOffline() {
    const box = document.getElementById('screenshotBox');
    box.innerHTML = '<div class="no-image">Emulator offline</div>';
    stopLive();
    document.getElementById('btnLive').classList.remove('active');
}

// --- Quest selector ---
function populateParts() {
    const sel = document.getElementById('selPart');
    sel.innerHTML = catalog.parts.map(p =>
        `<option value="${p.id}">${p.name}</option>`
    ).join('');
    onPartChange();
}

function onPartChange() {
    const partId = document.getElementById('selPart').value;
    const part = catalog.parts.find(p => p.id === partId);
    const sel = document.getElementById('selChapter');
    sel.innerHTML = (part?.chapters || []).map(c =>
        `<option value="${c.id}">${c.name}</option>`
    ).join('');
    onChapterChange();
}

function onChapterChange() {
    const partId = document.getElementById('selPart').value;
    const chapId = document.getElementById('selChapter').value;
    const part = catalog.parts.find(p => p.id === partId);
    const chapter = part?.chapters.find(c => c.id === chapId);
    const sel = document.getElementById('selQuest');
    sel.innerHTML = (chapter?.quests || []).map(q =>
        `<option value='${JSON.stringify(q.tuple)}'>${q.name}</option>`
    ).join('');
}

// --- Live screenshot toggle ---
function toggleLive() {
    if (manualMode) return;  // Can't turn off live during manual mode
    const btn = document.getElementById('btnLive');
    if (liveActive) {
        stopLive();
        btn.classList.remove('active');
    } else {
        startLive();
        btn.classList.add('active');
    }
}

function startLive() {
    liveActive = true;
    takeScreenshot();
}

function stopLive() {
    liveActive = false;
    if (liveInterval) { clearTimeout(liveInterval); liveInterval = null; }
}

// --- Auto Battle ---
function renderAutoBattle() {
    const btn = document.getElementById('btnAutoBattle');
    if (autoBattleActive) {
        btn.className = 'btn-auto-battle active';
        btn.textContent = '⚔ Cancel';
        btn.disabled = false;
    } else {
        btn.className = 'btn-auto-battle';
        btn.textContent = '⚔ Auto Battle';
        btn.disabled = !!(state.active && state.active.status === 'active');
    }
}

async function startAutoBattle() {
    if (autoBattleActive) {
        // Cancel running auto-battle
        try {
            await fetch(`${API}/api/control/auto-battle/cancel`, { method: 'POST' });
        } catch (e) {
            console.error('Cancel auto battle error:', e);
        }
    } else {
        // Exit manual mode first if active, keep live on
        if (manualMode) {
            await fetch(`${API}/api/control/manual`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({active: false})
            });
            // Ensure live stays active after exiting manual mode
            if (!liveActive) {
                startLive();
                document.getElementById('btnLive').classList.add('active');
            }
        }
        try {
            await fetch(`${API}/api/control/auto-battle`, { method: 'POST' });
        } catch (e) {
            console.error('Auto battle error:', e);
        }
    }
}

// --- Expandable items ---
function toggleExpand(btn, id) {
    if (expandedIds.has(id)) {
        expandedIds.delete(id);
    } else {
        expandedIds.add(id);
    }
    btn.classList.toggle('expanded');
    // Find the sibling .item-details: either in queue-item or directly after active-task
    const parent = btn.closest('.queue-item') || btn.closest('#activeSlot');
    if (parent) {
        const details = parent.querySelector('.item-details');
        if (details) details.classList.toggle('show');
    }
}

function describeTaskDetails(task) {
    if (task.type === 'operation' && task.params) {
        const lines = [];
        if (task.params.quests) {
            task.params.quests.forEach(q => {
                const name = findQuestName(q.quest) || q.quest.join('-');
                lines.push(`Quest: ${name} ×${q.count}`);
            });
        }
        if (task.params.normal_attack_only) lines.push('仅使用普通攻击: ✓');
        if (task.params.apple_total) lines.push(`Apples: ${task.params.apple_total} (${task.params.apple_kind || 'gold'})`);
        return lines.join('<br>') || 'No details';
    }
    if (task.type === 'battle') return 'One-off battle';
    if (task.type === 'wait') return `Wait for ${task.params.minutes || '?'} minutes`;
    if (task.type === 'stop_emulator') return 'Stop the emulator instance';
    if (task.type === 'start_emulator') return 'Start the emulator instance';
    return task.type;
}

// --- Drag and Drop ---
let dragSrcId = null;

function setupDragAndDrop() {
    const items = document.querySelectorAll('.queue-item[draggable]');
    items.forEach(item => {
        item.addEventListener('dragstart', e => {
            dragSrcId = item.dataset.id;
            item.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            document.querySelectorAll('.queue-item.drag-over').forEach(el => el.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (item.dataset.id !== dragSrcId) item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => {
            item.classList.remove('drag-over');
        });
        item.addEventListener('drop', e => {
            e.preventDefault();
            item.classList.remove('drag-over');
            if (item.dataset.id === dragSrcId) return;
            reorderQueue(dragSrcId, item.dataset.id);
        });
    });
}

async function reorderQueue(fromId, beforeId) {
    const ids = state.pending.map(t => t.id);
    const fromIdx = ids.indexOf(fromId);
    if (fromIdx === -1) return;
    ids.splice(fromIdx, 1);
    const toIdx = ids.indexOf(beforeId);
    ids.splice(toIdx, 0, fromId);
    try {
        await fetch(`${API}/api/queue/reorder`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids })
        });
        await fetchState();
    } catch (e) {
        console.error('Reorder error:', e);
    }
}

// --- Manual Mode ---
function renderManual() {
    const btn = document.getElementById('btnManual');
    btn.className = manualMode ? 'btn-manual active' : 'btn-manual';
    btn.textContent = manualMode ? '🖐 Manual ON' : '🖐 Manual';
    // Live button can't be toggled off during manual mode
    const btnLive = document.getElementById('btnLive');
    btnLive.disabled = manualMode;
}

async function toggleManual() {
    const newState = !manualMode;
    try {
        await fetch(`${API}/api/control/manual`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({active: newState})
        });
    } catch (e) {
        console.error('Toggle manual error:', e);
    }
}

function enableManualPreview() {
    // Remember if live was on before
    preManualLiveState = liveActive;
    // Force live on
    stopLive();
    const btn = document.getElementById('btnLive');
    btn.classList.add('active');
    startLive();
    // Attach pointer handlers
    attachPointerHandlers();
}

function disableManualPreview() {
    // Restore live to previous state
    stopLive();
    if (preManualLiveState) {
        const btn = document.getElementById('btnLive');
        btn.classList.add('active');
        startLive();
    } else {
        document.getElementById('btnLive').classList.remove('active');
    }
    // Remove pointer handlers
    detachPointerHandlers();
}

function imgToGame(offsetX, offsetY) {
    const img = document.querySelector('#screenshotBox img');
    if (!img) return [0, 0];
    const rect = img.getBoundingClientRect();
    const gx = Math.round((offsetX / rect.width) * 1280);
    const gy = Math.round((offsetY / rect.height) * 720);
    return [Math.max(0, Math.min(1280, gx)), Math.max(0, Math.min(720, gy))];
}

function onPointerDown(e) {
    if (!manualMode) return;
    pointerState = { x: e.offsetX, y: e.offsetY, time: Date.now() };
    e.preventDefault();
}

function onPointerUp(e) {
    if (!manualMode || !pointerState) return;
    const dx = e.offsetX - pointerState.x;
    const dy = e.offsetY - pointerState.y;
    const dt = Date.now() - pointerState.time;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const [gx1, gy1] = imgToGame(pointerState.x, pointerState.y);
    if (dist < 10 && dt >= 500) {
        // Long hold
        fetch(`${API}/api/input/hold`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({x: gx1, y: gy1, duration: dt})
        }).catch(e => console.error('Hold error:', e));
    } else if (dist < 10) {
        // Tap
        fetch(`${API}/api/input/tap`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({x: gx1, y: gy1})
        }).catch(e => console.error('Tap error:', e));
    } else {
        // Swipe
        const [gx2, gy2] = imgToGame(e.offsetX, e.offsetY);
        const duration = Math.max(100, Math.min(2000, dt));
        fetch(`${API}/api/input/swipe`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({x1: gx1, y1: gy1, x2: gx2, y2: gy2, duration})
        }).catch(e => console.error('Swipe error:', e));
    }
    pointerState = null;
}

function attachPointerHandlers() {
    const box = document.getElementById('screenshotBox');
    box.addEventListener('pointerdown', onPointerDown);
    box.addEventListener('pointerup', onPointerUp);
    box.addEventListener('contextmenu', preventContext);
    // Prevent default click (takeScreenshot) in manual mode
    box.removeAttribute('onclick');
}

function detachPointerHandlers() {
    const box = document.getElementById('screenshotBox');
    box.removeEventListener('pointerdown', onPointerDown);
    box.removeEventListener('pointerup', onPointerUp);
    box.removeEventListener('contextmenu', preventContext);
    box.setAttribute('onclick', 'takeScreenshot()');
}

function preventContext(e) { e.preventDefault(); }

// --- Init ---
connectWS();
fetchCatalog();
fetchState();
// Check device status before starting live
fetch(`${API}/api/device-status`).then(r => r.json()).then(data => {
    if (data.available) {
        startLive();
        document.getElementById('btnLive').classList.add('active');
    } else {
        showEmulatorOffline();
    }
}).catch(() => {
    startLive();
    document.getElementById('btnLive').classList.add('active');
});
</script>
